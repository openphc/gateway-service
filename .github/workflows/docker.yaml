name:  CI with  ECR

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write


jobs:
  build-test-scan-push:
    runs-on: ubuntu-latest
    
    env:
      AWS_REGION: ap-south-1
      AWS_ACCOUNT_ID: "586050444008"
      ECR_REPO: smartcare/dev/gateway-service
      IMAGE_TAG: ${{ github.sha }}

    steps:
   
    # Checkout 1
  
    - name: Checkout code
      uses: actions/checkout@v5

    
    # Unit Testing 2
    
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Run Unit Tests
      run: ./gradlew test

    
    #  SonarQube Scan 3
    
    - name: SonarQube Scan
      
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        SONAR.PROJECT.KEY: org.mdl.admin
        SONAR.PROJECT.NAME: Admin
      run: |
        ./gradlew build sonar

    # Build Image  with  gradle

    - name: Build with Gradle
      run: ./gradlew bootBuildImage --imageName=${ECR_REPO}:${IMAGE_TAG}

    #  Trivy Image Scan 5
    
    - name: Trivy Image Scan
      uses: aquasecurity/trivy-action@0.33.1
      with:
        image-ref: ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}
        format: table
        severity: CRITICAL,HIGH
        exit-code: "0"

    # Push Image to AWS ECR 6
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::586050444008:role/GitHubActions-ECR-Role
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Tag & Push Image
      run: |
        ECR_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}
        docker tag ${ECR_REPO}:${IMAGE_TAG} ${ECR_URI}:${IMAGE_TAG}
        docker push ${ECR_URI}:${IMAGE_TAG}

  EksDeploy:
    runs-on: ubuntu-latest
    needs: build-test-scan-push

    steps:
      - name: Clone GitOps repo (username + token)
        env:
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          CONFIG_PAT: ${{ secrets.CONFIG_PAT }}
        run: |
          git clone https://${GIT_USERNAME}:${CONFIG_PAT}@github.com/mdt-smartcare/deploy-scripts.git
          cd deploy-scripts
          git checkout main

      - name: Update image tag
        env:
          AWS_REGION: ap-south-1
          AWS_ACCOUNT_ID: "586050444008"
          ECR_REPO: smartcare/dev/gateway-service
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd deploy-scripts
          git checkout main

          ECR_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}

          sed -i "s|image: .*|image: ${ECR_URI}:${IMAGE_TAG}|" \
            Kubernetes/deployment/gatewaydepoyment.yaml

          git config user.name "ci-bot"
          git config user.email "ci-bot@github.com"

          git add Kubernetes/deployment/gatewaydepoyment.yaml
          git commit -m "ci: update image to ${IMAGE_TAG}"
          git push origin main