name: Java CI and ECR Push

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REPO: ${{ vars.AWS_ECR_REPO }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build and Scan with SonarQube
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      run: |
        ./gradlew build sonar \
          -Dsonar.host.url=${SONAR_HOST_URL} \
          -Dsonar.login=${SONAR_TOKEN} \
          -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
          -Dsonar.projectName=${{ vars.SONAR_PROJECT_NAME }}

    - name: Build container image
      run: |
        ECR_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}
        ./gradlew bootBuildImage --imageName=${ECR_URI}:latest
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:${{ vars.AWS_ROLE }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Tag & Push Image
      run: |
        ECR_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}
        docker tag ${ECR_URI}:latest ${ECR_URI}:${IMAGE_TAG}
        docker push ${ECR_URI}:${IMAGE_TAG}
        docker push ${ECR_URI}:latest
  
  trigger-deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success() # only for push to main and docker image is successfully created
    env:
      GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
    steps:
      - name: Trigger deploy-scripts workflow_dispatch
        run: |
          gh api --method POST \
            /repos/openphc/deploy-scripts/actions/workflows/deploy.yml/dispatches \
            --input - <<'JSON'
          {
            "ref": "main",
            "inputs": { "target_env": "dev" }
          }
          JSON