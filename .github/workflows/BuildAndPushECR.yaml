name: Java CI and GHCR Push

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: openphc/gateway-service
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build and Scan with SonarQube
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      run: |
        ./gradlew build sonar \
          -Dsonar.host.url=${SONAR_HOST_URL} \
          -Dsonar.login=${SONAR_TOKEN} \
          -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
          -Dsonar.projectName=${{ vars.SONAR_PROJECT_NAME }}

    - name: Build container image
      run: |
        IMAGE_URI=${REGISTRY}/${IMAGE_NAME}
        ./gradlew bootBuildImage --imageName=${IMAGE_URI}:latest

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Tag & Push Image
      run: |
        IMAGE_URI=${REGISTRY}/${IMAGE_NAME}
        docker tag ${IMAGE_URI}:latest ${IMAGE_URI}:${IMAGE_TAG}
        docker push ${IMAGE_URI}:${IMAGE_TAG}
        docker push ${IMAGE_URI}:latest

