name: Java CI and GHCR Push

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_URI: ghcr.io/${{ github.repository }}
  # Incremental release tags: v1, v2, v3, ... (one new tag per successful build)
  VERSION_TAG_PREFIX: v

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build and Scan with SonarQube
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      run: |
        ./gradlew build sonar \
          -Dsonar.host.url=${SONAR_HOST_URL} \
          -Dsonar.login=${SONAR_TOKEN} \
          -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
          -Dsonar.projectName=${{ vars.SONAR_PROJECT_NAME }}

    - name: Build container image
      run: ./gradlew bootBuildImage --imageName=${IMAGE_URI}:latest

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Determine next version tag
      id: version
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        PACKAGE_NAME="${GITHUB_REPOSITORY#*/}"
        OWNER="${GITHUB_REPOSITORY_OWNER}"
        PREFIX="${VERSION_TAG_PREFIX}"
        MAX=0

        if VERSIONS_JSON=$(gh api "/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions" --paginate 2>/dev/null); then
          while IFS= read -r tag; do
            if [[ "$tag" =~ ^${PREFIX}([0-9]+)$ ]]; then
              n="${BASH_REMATCH[1]}"
              if (( n > MAX )); then MAX=$n; fi
            fi
          done < <(echo "$VERSIONS_JSON" | jq -r '.[].metadata.container.tags[]?')
        fi

        NEXT=$((MAX + 1))
        echo "version_tag=${PREFIX}${NEXT}" >> "$GITHUB_OUTPUT"
        echo "Next version tag: ${PREFIX}${NEXT} (previous max: ${PREFIX}${MAX})"

    - name: Tag & Push Image
      run: |
        VERSION_TAG="${{ steps.version.outputs.version_tag }}"
        docker tag "${IMAGE_URI}:latest" "${IMAGE_URI}:${VERSION_TAG}"
        docker push "${IMAGE_URI}:${VERSION_TAG}"
        docker push "${IMAGE_URI}:latest"

  trigger-deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success() # only for push to main and docker image is successfully created
    env:
      GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
    steps:
      - name: Trigger deploy-scripts workflow_dispatch
        run: |
          gh api --method POST \
            /repos/openphc/deploy-scripts/actions/workflows/deploy.yml/dispatches \
            --input - <<'JSON'
          {
            "ref": "main",
            "inputs": { "target_env": "dev" }
          }
          JSON
