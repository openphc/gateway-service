name: Java CI with  ECR

on:
  push:
    branches: 
      - main
      - sc-394
  pull_request:
    branches: 
      - main


jobs:
  build-test-scan-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      AWS_REGION: ap-south-1
      AWS_ACCOUNT_ID: "586050444008"
      ECR_REPO: smartcare/dev
      IMAGE_TAG: ${{ github.sha }}

    steps:
   
    # Checkout 1
  
    - name: Checkout code
      uses: actions/checkout@v5

    
    # Unit Testing 2
    
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Run Unit Tests
      run: ./gradlew test

    
    #  SonarQube Scan 3
    
    - name: SonarQube Scan
      
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        SONAR.PROJECT.KEY: org.mdl.admin
        SONAR.PROJECT.NAME: Admin
      run: |
        ./gradlew build sonar

 
    # Build Docker Image 4

    - name: Build Docker Image
      run: |
        docker build -t $ECR_REPO:$IMAGE_TAG .

    #  Trivy Image Scan 5
    
    - name: Trivy Image Scan
      uses: aquasecurity/trivy-action@0.33.1
      with:
        image-ref: ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}
        format: table
        severity: CRITICAL,HIGH
        exit-code: "0"

    # Push Image to AWS ECR 6
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::586050444008:role/GitHubActions-ECR-Role
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Tag & Push Image
      run: |
        ECR_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}
        docker tag ${ECR_REPO}:${IMAGE_TAG} ${ECR_URI}:${IMAGE_TAG}
        docker push ${ECR_URI}:${IMAGE_TAG}