server:
  port: 8090

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: ${ALLOWED_ORIGINS:http://localhost:3000,http://workflow.mdtlabs.org}
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600
          routes:
            - id: admin-service
              uri: ${ADMIN_SERVICE_URI:http://127.0.0.1:8085}
              predicates:
                - Path=/admin/**
              filters:
                - name: JwtValidationFilter

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.mdl.smartcare.gateway.security: INFO

jwt:
  issuer: ${JWT_ISSUER:https://keycloak.mdtlabs.org/realms/smartcare}
  audience: ${JWT_AUDIENCE:account}

authorization:
  enabled: ${AUTHORIZATION_ENABLED:false}
  permission-mappings:
    USER_READ:
      - method: GET
        uri: /admin/users/*
      - method: GET
        uri: /admin/users
    USER_CREATE_UPDATE:
      - method: POST
        uri: /admin/users
      - method: PUT
        uri: /admin/users/*
      - method: PATCH
        uri: /admin/users/*
    USER_DELETE:
      - method: DELETE
        uri: /admin/users/*
    PERMISSION_READ:
      - method: GET
        uri: /admin/permissions
      - method: GET
        uri: /admin/permissions/*
    ROLE_READ:
      - method: GET
        uri: /admin/roles
      - method: GET
        uri: /admin/roles/*
    ROLE_CREATE_UPDATE:
      - method: POST
        uri: /admin/roles
      - method: PUT
        uri: /admin/roles/*
      - method: PATCH
        uri: /admin/roles/*
    ROLE_DELETE:
      - method: DELETE
        uri: /admin/roles/*
    AU_DEFINITION_READ:
      - method: GET
        uri: /admin/au-definition
      - method: GET
        uri: /admin/au-definition/*
      - method: GET
        uri: /admin/au-definition/tree
    AU_DEFINITION_CREATE_UPDATE:
      - method: POST
        uri: /admin/au-definition
      - method: PUT
        uri: /admin/au-definition/*
      - method: PATCH
        uri: /admin/au-definition/*
    AU_DEFINITION_DELETE:
      - method: DELETE
        uri: /admin/au-definition/*
