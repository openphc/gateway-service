server:
  port: 8090

spring:
  application:
    name: gateway-service
  
  # Database Configuration
  r2dbc:
    url: ${DATABASE_URL:r2dbc:postgresql://localhost:5432/admin_service}
    username: ${DATABASE_USERNAME:opensrp}
    password: ${DATABASE_PASSWORD:opensrp123}
  
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: ${ALLOWED_ORIGINS:http://localhost:3000,http://workflow.mdtlabs.org}
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600
          routes:
            - id: admin-service
              uri: ${ADMIN_SERVICE_URI:http://localhost:8085}
              predicates:
                - Path=/admin/**
              filters:
                - name: JwtValidationFilter

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.mdl.smartcare.gateway.security: INFO

jwt:
  issuer: ${JWT_ISSUER:https://keycloak.mdtlabs.org/realms/smartcare}
  audience: ${JWT_AUDIENCE:account}
  roles-claim-path: ${JWT_ROLES_CLAIM_PATH:realm_access.roles}

keycloak:
  admin:
    server-url: ${KEYCLOAK_SERVER_URL:https://keycloak.mdtlabs.org}
    realm: ${KEYCLOAK_REALM:master}
    target-realm: ${KEYCLOAK_TARGET_REALM:smartcare}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
    # client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}
    username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin123}

authorization:
  enabled: ${AUTHORIZATION_ENABLED:true}

permissions:
  load-from-database-on-startup: ${LOAD_PERMISSIONS_FROM_DATABASE_ON_STARTUP:false}
