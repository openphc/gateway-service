server:
  port: 8081

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: admin-service
              uri: ${ADMIN_SERVICE_URI:http://127.0.0.1:8085}
              predicates:
                - Path=/admin/**

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
