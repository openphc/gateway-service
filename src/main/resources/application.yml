server:
  port: 8090

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: ${ALLOWED_ORIGINS:http://localhost:3000,http://workflow.mdtlabs.org}
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600
          routes:
            - id: admin-service
              uri: ${ADMIN_SERVICE_URI:http://127.0.0.1:8085}
              predicates:
                - Path=/admin/**
              filters:
                - name: JwtValidationFilter

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.mdl.smartcare.gateway.security: INFO

jwt:
  issuer: ${JWT_ISSUER:https://keycloak.mdtlabs.org/realms/smartcare}
  audience: ${JWT_AUDIENCE:account}
